name: Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      !contains(github.event.head_commit.message, '[ci-skip]') &&
      !contains(github.event.head_commit.message, '[skip-ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]') &&
      !contains(github.event.head_commit.message, '[skip ci]')

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
      BETTER_AUTH_URL: http://localhost:3000
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      NODE_ENV: test
      PORT: 3000
      EXECUTOR_ADDR: http://localhost:6969

    steps:
      - name: Start executor
        run: |
          docker run -d \
            --name battlegrounds-executor \
            --security-opt seccomp:unconfined \
            --cap-add SYS_ADMIN \
            -p 6969:6969 \
            us-central1-docker.pkg.dev/code-battlegrounds/app/rootjail:latest

      - name: Wait for executor
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:6969/health > /dev/null 2>&1; then
              echo "Executor ready"; exit 0
            fi
            sleep 2
          done
          echo "Executor failed to start"; exit 1

      - name: Generate auth secret
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -base64 32)" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx --bun prisma generate

      - name: Run database migrations
        run: bunx --bun prisma migrate deploy

      - name: Seed database
        run: bunx --bun prisma db seed

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**', 'public/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build Next.js app
        run: bun run build

      - name: Start server
        run: bun run start &

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server on port $PORT..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:$PORT > /dev/null 2>&1; then
              echo "Server is up!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Run tests
        run: bun test 2>&1 | tee test-output.txt